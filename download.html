<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | The Organised Types</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

:root{
    --tots-green:#a9b897;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    color:#334155;
    background:#f8f9f7;
}

.hero{
    position:relative;
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:url('bg1.jpg') center/cover;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.55);
}

.hero-content{
    position:relative;
    z-index:2;
    color:white;
    max-width:700px;
    padding:20px;
}

.hero h1{
    font-size:3.5rem;
    margin-bottom:20px;
    text-shadow:0 0 15px var(--tots-green);
}

.hero p{
    font-size:1.2rem;
}

.section{
    max-width:900px;
    margin:70px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:50px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.card h2{
    font-size:2rem;
    margin-bottom:15px;
}

.card p{
    line-height:1.8;
    margin-bottom:30px;
}

.download-btn{
    display:inline-block;
    background:var(--tots-green);
    color:white;
    padding:18px 45px;
    border-radius:999px;
    text-decoration:none;
    font-weight:700;
    transition:.3s;
}

.download-btn:hover{
    transform:scale(1.05);
}

.help{
    margin-top:60px;
    text-align:center;
}

.help h3{
    margin-bottom:15px;
}

.help a{
    color:var(--tots-green);
    font-weight:600;
    text-decoration:none;
}

footer{
    margin-top:80px;
}

@media(max-width:768px){

.hero h1{
    font-size:2.5rem;
}

.card{
    padding:30px;
}

}

</style>

</head>

<body>

<div id="site-header"></div>

<section class="hero">

<div class="hero-content">

<h1>Thank You!</h1>

<p>Your purchase is complete.</p>

</div>

</section>

<section class="section">

<div class="card">

<h2 id="productName">Your Download</h2>

<p>
Thank you for supporting The Organised Types.
Your digital download is ready below.
</p>

<a id="downloadButton" href="#" class="download-btn" download>
Download Now
</a>

<div class="help">

<h3>Need Help?</h3>

<p>
If you have any problems downloading your purchase,
please <a href="contact.html">contact us</a>.
</p>

</div>

</div>

</section>

<div id="site-footer"></div>

<script>

// PRODUCTS

const products={

"Social Media Strategy Course":{
name:"Social Media Strategy Course",
file:"socialmediastrategycourse.pdf"
},

"content-calendar":{
name:"Content Calendar",
file:"downloads/content-calendar.pdf"
},

"home-planner":{
name:"Home Planner",
file:"downloads/home-planner.pdf"
},

"meal-planner":{
name:"Meal Planner",
file:"downloads/meal-planner.pdf"
},

"bundle":{
name:"Ultimate Bundle",
file:"downloads/bundle.zip"
}

};

// Read URL

const params=new URLSearchParams(window.location.search);

const product=params.get("product");

const productName=document.getElementById("productName");

const button=document.getElementById("downloadButton");

if(products[product]){

productName.textContent=products[product].name;

button.href=products[product].file;

}else{

productName.textContent="Download not found";

button.style.display="none";

}

fetch('header.html')
.then(r=>r.text())
.then(data=>document.getElementById('site-header').innerHTML=data);

fetch('footer.html')
.then(r=>r.text())
.then(data=>document.getElementById('site-footer').innerHTML=data);

</script>

</body>
</html>
