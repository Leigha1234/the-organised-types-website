<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Organised Types | Systems, Websites & The Future of TOTS OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="homscss.css">
    <style>
        :root { --tots-green: #a9b897; } 
        body { font-family: 'Poppins', sans-serif; margin: 0; color: #334155; }
        
        /* Hero & Section Layout */
        .section { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
        
        /* TOTS Band - Fixed Alignment */
        .tots-band { 
            background: #0f0f0f; 
            color: white; 
            border-radius: 30px; 
            padding: 60px 20px; 
            text-align: center; 
            margin: 20px auto;
            max-width: 1100px;
        }
        
        /* Structured Image Grid for TOTS OS */
        .tots-image-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
            margin: 40px auto; 
            max-width: 900px; 
        }
        
        .tots-image-grid img { 
            width: 100%; 
            height: auto; 
            border-radius: 12px; 
            display: block; 
        }

        /* Button styling */
        .btn-green { 
            background: var(--tots-green); 
            color: white; 
            padding: 18px 36px; 
            border-radius: 999px; 
            text-decoration: none; 
            font-weight: 700; 
            display: inline-block;
        }
    </style>
</head>

<body>
    <!-- TOTS OS Section with Clean Grid -->
    <section class="section tots-band">
        <img src="TOTSLogo.jpeg" alt="TOTS Logo" style="max-width: 150px; margin: 0 auto 20px; display: block;">
        <h2>TOTS OS: Your second brain.</h2>
        
        <div class="tots-image-grid">
            <img src="TOTSOSDASHBOARD.jpeg" alt="Dashboard">
            <img src="TOTSOS1.jpeg" alt="OS Detail">
            <img src="Dailyfocus.jpeg" alt="OS Logo">
        </div>
        
        <a href="https://tots-os.co.uk" class="btn-green">Join the Waiting List</a>
    </section>

    <script>
        // Scripts remain unchanged
        fetch('header.html').then(r => r.text()).then(d => document.getElementById('site-header').innerHTML = d);
        fetch('footer.html').then(r => r.text()).then(d => document.getElementById('site-footer').innerHTML = d);
    </script>
</body>
</html>
