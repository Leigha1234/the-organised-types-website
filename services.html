<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Digital Resources | The Organised Types</title>
    <style>
        :root { --tots-green: #a9b897; }
        body { font-family: 'Poppins', sans-serif; background: #faf9f6; padding: 40px; color: #334155; }
        .resource-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: auto; }
        .resource-card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .price { font-weight: 700; color: var(--tots-green); display: block; margin: 10px 0; }
        .btn { background: var(--tots-green); color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; border: none; cursor: pointer; display: inline-block; margin: 5px; }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; max-width: 500px; }
    </style>
</head>
<body>

<div class="resource-grid" id="product-list"></div>

<div id="modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
        <a id="modal-buy" class="btn" href="#">Buy Now</a>
        <button class="btn" onclick="document.getElementById('modal').style.display='none'">Close</button>
    </div>
</div>

<script>
    // Full product list compiled from your files
    const products = [
        { title: 'Branding Complete Suite', desc: 'Build a consistent brand identity.', price: '£TBC', url: 'https://buy.stripe.com/3cI6oA28p5cN7yy5fG83C0C' },
        { title: '2-Day Business Audit', desc: 'A deep dive into your systems.', price: '£TBC', url: 'https://buy.stripe.com/14A6oAfZf8oZcSSaA083C0B' },
        { title: 'Annual Planner', desc: 'Plan your year with clarity.', price: '£TBC', url: 'https://buy.stripe.com/7sYfZafZf9t34mmeQg83C0A' },
        { title: 'Brand Kickstart', desc: 'Get your brand foundations right.', price: '£TBC', url: 'https://buy.stripe.com/8x2eV67sJ7kV8CCeQg83C0z' },
        { title: 'Business Sales Roadmap', desc: 'Create a sustainable sales process.', price: '£TBC', url: 'https://buy.stripe.com/bJedR228p6gRbOO4b' },
        { title: 'Starter Website', desc: 'A clean, functional website template.', price: '£TBC', url: 'https://buy.stripe.com/cNi3coaEV6gR2ee37y83C0b' },
        { title: 'Productivity & Focus Checklist', desc: 'Stay organised and on task.', price: '£TBC', url: 'https://buy.stripe.com/eVq5kwdR7cFfaKK37y83C0a' },
        { title: 'Premium Brand & Social Kit', desc: 'Elevate your online presence.', price: '£TBC', url: 'https://buy.stripe.com/8x25kwdR70Wxg54bE483C09' },
        { title: 'Workout Tracker', desc: 'Keep track of your physical goals.', price: '£TBC', url: 'https://buy.stripe.com/6oU14gfZfax7cSS9vW83C08' },
        { title: 'Weekly Planner', desc: 'Master your weekly schedule.', price: '£TBC', url: 'https://buy.stripe.com/14AbIU7sJ9t3cSS8rS83C07' },
        { title: 'TOTS OS Elite', desc: 'Our premium business operating system.', price: '£TBC', url: '#' },
        { title: 'TOTS OS Premium', desc: 'Advanced management tools for teams.', price: '£TBC', url: '#' }
    ];

    const container = document.getElementById('product-list');
    products.forEach(p => {
        container.innerHTML += `
            <div class="resource-card">
                <h3>${p.title}</h3>
                <span class="price">${p.price}</span>
                <button class="btn" onclick="showModal('${p.title}', '${p.desc}', '${p.url}')">Find out more</button>
            </div>`;
    });

    function showModal(t, d, u) {
        document.getElementById('modal-title').innerText = t;
        document.getElementById('modal-desc').innerText = d;
        document.getElementById('modal-buy').href = u;
        document.getElementById('modal').style.display = 'flex';
    }
</script>
</body>
</html>
