<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | The Organised Types</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="homscss.css">
    <style>
        :root { --tots-green: #a9b897; } 
        body { font-family: 'Poppins', sans-serif; margin: 0; color: #334155; }
        
        .section { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
        
        .package-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            margin-top: 40px; 
            min-height: 200px; /* Ensures space exists even if cards don't render */
        }
        
        .package-card { 
            padding: 40px; 
            border-radius: 25px; 
            background: #f8f8f8; 
            border: 1px solid #eee;
            display: flex; 
            flex-direction: column;
            text-align: center;
        }
        
        .package-card h3 { color: #000; margin-top: 0; }
        .price { font-size: 1.5rem; font-weight: 700; color: var(--tots-green); margin: 20px 0; }
        
        .btn-green { 
            background: var(--tots-green); color: white; padding: 15px 30px; 
            border-radius: 999px; text-decoration: none; font-weight: 700; 
            text-align: center; display: inline-block; margin-top: auto;
        }
        .btn-green:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    
    <div id="site-header"></div>

    <section class="section">
        <h1 style="text-align: center;">Our Packages</h1>
        <div class="package-grid" id="product-container">
            <div class="package-card"><h3>Product 1</h3><p>Description.</p><div class="price">£Price</div><a href="https://buy.stripe.com/6oU8wI14l20B3iibE483C06" class="btn-green">Purchase Now</a></div>
            </div>
    </section>

    <div id="site-footer"></div>

    <script>
        // Use try-catch to prevent script errors from hiding content
        async function loadPartials() {
            const files = [
                { id: 'site-header', url: 'header.html' },
                { id: 'site-footer', url: 'footer.html' }
            ];

            for (const file of files) {
                try {
                    const response = await fetch(file.url);
                    if (response.ok) {
                        const data = await response.text();
                        document.getElementById(file.id).innerHTML = data;
                    }
                } catch (e) {
                    console.error(`Could not load ${file.url}:`, e);
                }
            }
        }
        loadPartials();
    </script>
</body>
</html>
