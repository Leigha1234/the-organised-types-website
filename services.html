<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | The Organised Types</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="homscss.css">
    <style>
        :root { --tots-green: #a9b897; } 
        body { font-family: 'Poppins', sans-serif; margin: 0; color: #334155; }
        .section { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
        .package-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .package-card { padding: 30px; border-radius: 25px; background: #f8f8f8; border: 1px solid #eee; text-align: center; }
        .package-card img { max-width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .price { font-size: 1.5rem; font-weight: 700; color: var(--tots-green); margin: 15px 0; }
        .btn-green { background: var(--tots-green); color: white; padding: 12px 24px; border-radius: 999px; text-decoration: none; font-weight: 700; display: inline-block; }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <section class="section">
        <h1>Our Packages</h1>
        <div id="product-grid" class="package-grid">
            <p>Loading your products from Stripe...</p>
        </div>
    </section>

    <div id="site-footer"></div>

    <script>
        // Use your Stripe Public Key here
        const stripe = Stripe('pk_live_51TJWyi1TJBSxkUljztN6zRcppisDfArR0JADTSr8oSlI1PhauLciNHQnQ397bfZTHbckfnOxD7D8U4iPCgogYVYT00HxRooNRo');

        async function fetchProducts() {
            // This pulls products marked as 'active' in your Stripe Dashboard
            const products = await stripe.products.list({active: true, expand: ['data.default_price']});
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ''; // Clear loading text

            products.data.forEach(product => {
                const card = document.createElement('div');
                card.className = 'package-card';
                card.innerHTML = `
                    ${product.images[0] ? `<img src="${product.images[0]}" alt="${product.name}">` : ''}
                    <h3>${product.name}</h3>
                    <p>${product.description || ''}</p>
                    <div class="price">£${(product.default_price.unit_amount / 100).toFixed(2)}</div>
                    <a href="#" class="btn-green">Purchase Now</a>
                `;
                grid.appendChild(card);
            });
        }
        fetchProducts();
    </script>
</body>
</html>
