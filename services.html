<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | The Organised Types</title>
    <style>
        :root { --tots-green: #a9b897; --cream: #faf9f6; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--cream); margin: 0; }

        /* Ensure header has the correct background color */
        #site-header { background-color: var(--cream); padding-bottom: 20px; }
        .page-container { max-width: 1100px; margin: 40px auto; padding: 20px; }

        /* Single grid container to hold all cards */
        .package-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
            margin-top: 20px;
        }

        .package-card { 
            background: #fff; padding: 30px; border-radius: 20px;
            text-align: center; border: 1px solid #eee;
            display: flex; flex-direction: column; align-items: center;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="page-container">
        <h1 style="text-align:center;">Our Packages</h1>
        <div class="package-grid">
            </div>
    </div>

    <div id="site-footer"></div>

    <script>
        // Ensure you are using Live Server (http://127.0.0.1) for these to work
        fetch('header.html').then(r => r.text()).then(d => document.getElementById('site-header').innerHTML = d);
        fetch('footer.html').then(r => r.text()).then(d => document.getElementById('site-footer').innerHTML = d);
    </script>
</body>
</html>
