<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | The Organised Types</title>
    <style>
        :root { --tots-green: #a9b897; }
        body { font-family: 'Poppins', sans-serif; background-color: #faf9f6; margin: 0; }
        .main-wrapper { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        .package-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px;
        }
        .package-card { 
            background: #fff; padding: 30px; border-radius: 20px;
            text-align: center; border: 1px solid #eee;
            display: flex; flex-direction: column; align-items: center;
        }
        .btn-more { background: #f4f4f4; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; color: #777; margin-bottom: 10px; }
        .btn-green { background: var(--tots-green); color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 700; margin-top: 10px; }
        
        dialog { border-radius: 20px; border: none; padding: 40px; max-width: 500px; }
    </style>
</head>
<body>

    <div id="site-header"></div>

    <div class="main-wrapper">
        <h1 style="text-align:center;">Our Packages</h1>
        <div class="package-grid">
            <div class="package-card">
                <h3>Yearly Goals Planner</h3>
                <p>Plan your year with clarity...</p>
                <button class="btn-more" onclick="showModal('Yearly Goals Planner', 'Full description text here.')">Find out more</button>
                <div class="price">£0.00</div>
                <a href="#" class="btn-green">Purchase Now</a>
            </div>
        </div>
    </div>

    <div id="site-footer"></div>

    <dialog id="productModal">
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>
        <button onclick="document.getElementById('productModal').close()">Close</button>
    </dialog>

    <script>
        // Load Header & Footer
        fetch('header.html').then(r => r.text()).then(d => document.getElementById('site-header').innerHTML = d).catch(e => console.log('Header missing'));
        fetch('footer.html').then(r => r.text()).then(d => document.getElementById('site-footer').innerHTML = d).catch(e => console.log('Footer missing'));

        // Modal Function
        function showModal(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('productModal').showModal();
        }
    </script>
</body>
</html>
