    <link rel="stylesheet" href="global.css">
    <style>
        /* Services Page Layout */
        .services-hero { padding: 150px 20px 60px; text-align: center; }
        .package-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .package-card { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid #e5e5e5; display: flex; flex-direction: column; }
        .package-card h4 { margin-top: 0; font-size: 1.5em; color: var(--primary-color); }
        .price { font-size: 1.3em; font-weight: 700; color: var(--accent-color); margin: 15px 0; }
        .cta-button { text-align: center; margin-top: auto; padding: 15px; text-decoration: none; display: block; border-radius: 999px; background: var(--accent-color); color: var(--primary-color); font-weight: 600; }
        .cta-button:hover { background: var(--primary-color); color: white; }
    </style>
</head>
