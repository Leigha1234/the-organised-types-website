<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | The Organised Types</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="homscss.css">
    <style>
        :root { --tots-green: #a9b897; } 
        body { font-family: 'Poppins', sans-serif; margin: 0; color: #334155; }
        
        /* Services Layout */
        .section { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
        .package-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            margin-top: 40px; 
        }
        .package-card { 
            padding: 40px; 
            border-radius: 25px; 
            background: #f8f8f8; 
            border: 1px solid #eee;
            display: flex; 
            flex-direction: column;
            transition: 0.3s;
        }
        .package-card:hover { border-color: var(--tots-green); }
        .package-card h3 { margin-top: 0; color: #000; }
        .price { font-size: 1.5rem; font-weight: 700; color: var(--tots-green); margin: 20px 0; }
        
        .btn-green { 
            background: var(--tots-green); color: white; padding: 15px 30px; 
            border-radius: 999px; text-decoration: none; font-weight: 700; 
            text-align: center; transition: 0.3s; display: inline-block; margin-top: auto;
        }
        .btn-green:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <section class="section">
        <h1>Our Packages</h1>
        <p>Select a service below to get started. From website builds to full system architecture, we have the right structure for you.</p>

        <div class="package-grid">
            <div class="package-card">
                <h3>Product Name</h3>
                <p>Brief description of what is included in this package.</p>
                <div class="price">£499</div>
                <a href="https://buy.stripe.com/6oU8wI14l20B3iibE483C06" class="btn-green">Purchase Now</a>
            </div>
            
            </div>
    </section>

    <div id="site-footer"></div>

    <script>
        fetch('header.html').then(r => r.text()).then(d => document.getElementById('site-header').innerHTML = d);
        fetch('footer.html').then(r => r.text()).then(d => document.getElementById('site-footer').innerHTML = d);
    </script>
</body>
</html>
