<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | The Organised Types</title>
    <style>
        :root { --tots-green: #a9b897; --cream: #faf9f6; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--cream); margin: 0; }
        
        .page-container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* Fix: Grid layout for side-by-side cards */
        .package-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px;
            margin-top: 40px;
        }

        /* Card styling */
        .package-card { 
            background: #fff; padding: 30px; border-radius: 20px;
            text-align: center; border: 1px solid #eee;
            display: flex; flex-direction: column; align-items: center;
        }

        h3 { margin: 0 0 10px 0; font-size: 1.3rem; }
        p { color: #555; font-size: 0.9rem; margin-bottom: 15px; }
        .price { font-size: 1.2rem; font-weight: 700; color: var(--tots-green); margin: 10px 0; }
        
        /* Buttons: Width limited to fit-content to stop stretching */
        .btn-more { background: #f4f4f4; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; color: #777; font-size: 0.8rem; }
        .btn-green { background: var(--tots-green); color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 700; display: inline-block; margin-top: 10px; width: fit-content; }
        
        /* Modal */
        dialog { border-radius: 20px; border: none; padding: 40px; max-width: 500px; }
    </style>
</head>
<body>

    <div id="site-header" style="background-color: var(--cream);">
        </div>

    <div class="page-container">
        <h1 style="text-align:center;">Our Packages</h1>
        
        <div class="package-grid">
            <div class="package-card">
                <h3>Yearly Goals Planner</h3>
                <p>Plan your year with clarity, intention, and calm...</p>
                <button class="btn-more" onclick="showModal('Yearly Goals Planner', 'Full description text here.')">Find out more</button>
                <div class="price">£0.00</div>
                <a href="https://buy.stripe.com/..." class="btn-green">Purchase Now</a>
            </div>

            <div class="package-card">
                <h3>Weekly Planner</h3>
                <p>Stay organised, focused, and productive...</p>
                <button class="btn-more" onclick="showModal('Weekly Planner', 'Full description here.')">Find out more</button>
                <div class="price">£0.00</div>
                <a href="https://buy.stripe.com/..." class="btn-green">Purchase Now</a>
            </div>
        </div>
    </div>

    <div id="site-footer"></div>

    <dialog id="productModal">
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>
        <button onclick="document.getElementById('productModal').close()">Close</button>
    </dialog>

    <script>
        // Load partials
        async function loadPartials(id, url) {
            try {
                const res = await fetch(url);
                if (res.ok) document.getElementById(id).innerHTML = await res.text();
            } catch (e) { console.warn('Could not load partial'); }
        }
        loadPartials('site-header', 'header.html');
        loadPartials('site-footer', 'footer.html');

        function showModal(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('productModal').showModal();
        }
    </script>
</body>
</html>
